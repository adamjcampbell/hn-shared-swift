name: HackerNewsReader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

# Local SwiftPM dependency on the cross-platform HackerNewsReader package.
packages:
  HackerNewsReader:
    path: ../HackerNewsReader

targets:
  HackerNewsReader:
    type: application
    platform: iOS
    sources:
      - path: HackerNewsReader
    info:
      path: HackerNewsReader/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Hacker News Reader
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hackernewsreader
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: HackerNewsReader
        product: HackerNewsReader
