name: HackerNewsReader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

# Local SwiftPM dependency on the cross-platform HackerNewsReader package.
packages:
  HackerNewsReader:
    path: ../HackerNewsReader

targets:
  # Target name differs from the SwiftPM product `HackerNewsReader` so
  # the iOS app's Swift module doesn't collide with the package's at
  # build time (Apple's WWDC sample convention: app target `Foo` +
  # SwiftPM product `FooKit`). Here the product is the unsuffixed name
  # the consumer wants, so the *target* takes the suffix instead.
  # Project + scheme stay `HackerNewsReader` (via top-level `name` and
  # `schemes:` below); the bundle on disk is `HackerNewsReaderApp.app`
  # but users see `CFBundleDisplayName` ("Hacker News Reader").
  HackerNewsReaderApp:
    type: application
    platform: iOS
    sources:
      - path: HackerNewsReader
    info:
      path: HackerNewsReader/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Hacker News Reader
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.hackernewsreader
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: HackerNewsReader
        product: HackerNewsReader

schemes:
  HackerNewsReader:
    build:
      targets:
        HackerNewsReaderApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
